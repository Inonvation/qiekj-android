name: 构建并发布 Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 设置 Gradle 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 APK
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Building version: $VERSION"
          ./gradlew :app:assembleDebug -PbuildVersionName="$VERSION"
          # 重命名 APK：ShouDiao-v{版本号}.apk
          cp app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/ShouDiao-v${VERSION}.apk"

      - name: 生成更新日志
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | sed -n '2p' || echo "")
          cat > release_body.md << EOM
          ### 瘦刁生活 ${{ github.ref_name }}
          
          EOM
          if [ -z "$PREV_TAG" ]; then
            echo "首次发布" >> release_body.md
          else
            git log --oneline --no-decorate "${PREV_TAG}.." -- . ':!archive' ':!.github' 2>/dev/null | head -30 >> release_body.md
          fi
          echo "" >> release_body.md
          echo "> 如果安装提示签名不一致，请先卸载旧版。" >> release_body.md

      - name: 上传 APK 到 Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: app/build/outputs/apk/debug/ShouDiao-v*.apk
          name: ${{ github.ref_name }}
          body_path: release_body.md
          make_latest: true
          fail_on_unmatched_files: false
